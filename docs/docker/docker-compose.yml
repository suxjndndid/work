# 开发模式 docker-compose
# 用法: cd docs/docker && docker compose up -d

services:
  mysql:
    image: mysql:8.0
    container_name: lesson-plan-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: lesson_plan_db
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_general_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ../schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./mysql-charset.cnf:/etc/mysql/conf.d/charset.cnf
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci --character-set-client-handshake=FALSE --init-connect='SET NAMES utf8mb4'
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../..
      dockerfile: docs/docker/Dockerfile.backend
    container_name: lesson-plan-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/lesson_plan_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      AI_BASE_URL: ${AI_BASE_URL:-https://api.openai.com/v1/}
      AI_API_KEY: ${AI_API_KEY:-sk-your-api-key}
      AI_CHAT_MODEL: ${AI_CHAT_MODEL:-gpt-4o-mini}
      AI_EMBEDDING_MODEL: ${AI_EMBEDDING_MODEL:-}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ../../log:/app/logs

  frontend:
    image: node:20-alpine
    container_name: lesson-plan-frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ../../frontend:/app
      - frontend-node-modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend

volumes:
  mysql-data:
  frontend-node-modules:
