# 生产模式 docker-compose
# 用法: cd docs/docker && docker compose -f docker-compose.prod.yml up -d

services:
  mysql:
    image: mysql:8.0
    container_name: lesson-plan-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: lesson_plan_db
    volumes:
      - mysql-data:/var/lib/mysql
      - ../schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../..
      dockerfile: docs/docker/Dockerfile.backend
    container_name: lesson-plan-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/lesson_plan_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.openai.com/v1/}
      AI_API_KEY: ${AI_API_KEY}
      AI_CHAT_MODEL: ${AI_CHAT_MODEL:-gpt-4o-mini}
      AI_EMBEDDING_MODEL: ${AI_EMBEDDING_MODEL:-}
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../..
      dockerfile: docs/docker/Dockerfile.frontend
    container_name: lesson-plan-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql-data:
