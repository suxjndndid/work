server:
  port: 12000

spring:
  application:
    name: intelligent-lesson-plan
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:13306/lesson_plan_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

sa-token:
  token-name: Authorization
  timeout: 86400
  active-timeout: -1
  is-concurrent: true
  token-style: uuid

ai:
  openai:
    base-url: ${AI_BASE_URL:https://api.openai.com/v1/}
    api-key: ${AI_API_KEY:sk-your-api-key}
    chat-model-name: ${AI_CHAT_MODEL:gpt-4o-mini}
    embedding-model-name: ${AI_EMBEDDING_MODEL:}
    temperature: 0.7
    max-tokens: 4096
